services:
  - type: web
    name: aurahr-sentiment-hub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
        description: "Your MongoDB Atlas connection string"
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key"
