version: "3.8"

services:
  aurahr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurahr-agent
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
    restart: always
